<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SwiftConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-color">
    <div class="auth-page">
        <div class="auth-card shadow-lg">
            <div class="auth-logo">SwiftConnect</div>
            <div class="auth-subtitle">Sign in to your dashboard</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'error' else 'error' }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input" required placeholder="name@company.com">
                </div>
                
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn btn-primary"><i data-lucide="log-in"></i> Log In</button>
            </form>
            <div class="mt-4">
                <a href="{{ url_for('home') }}" class="btn-secondary" style="font-size: 0.9rem; text-decoration: none; display: inline-block; padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border-color); color: var(--text-muted);"><i data-lucide="home" style="width: 14px; margin-right: 4px;"></i>Back to Home</a>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
