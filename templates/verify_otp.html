<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - SwiftConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-color">
    <div class="auth-page">
        <div class="auth-card shadow-lg">
            <div class="auth-logo">SwiftConnect</div>
            <div class="auth-subtitle">Verify your email address</div>

            <p style="text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px;">
                We've sent a 6-digit verification code to<br>
                <strong>{{ email }}</strong>
            </p>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category if category != 'error' else 'error' }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('verify_otp') }}">
                <div class="form-group text-center">
                    <label for="otp" class="form-label" style="text-align: left;">Verification Code</label>
                    <input type="text" id="otp" name="otp" class="form-input text-center" required placeholder="000000"
                        style="font-size: 1.5rem; letter-spacing: 0.5rem; font-weight: 600;" maxlength="6"
                        autocomplete="off">
                </div>

                <button type="submit" class="btn btn-primary"><i data-lucide="check-shield"></i> Verify Account</button>
            </form>
            <div class="mt-4 text-center">
                <a href="{{ url_for('auth') }}" class="btn-secondary"
                    style="font-size: 0.9rem; text-decoration: none; display: inline-block; padding: 4px 12px; border-radius: 4px; border: 1px solid var(--border-color); color: var(--text-muted);">Back
                    to Setup</a>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
