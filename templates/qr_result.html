<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generated - SwiftConnect</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-color">
    <div class="auth-page">
        <div class="auth-card shadow-lg" style="max-width: 480px;">
            <div class="auth-logo">SwiftConnect</div>
            <div class="auth-subtitle mb-8">Your QR code has been generated</div>

            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename=qr_path) }}" alt="Generated QR" style="max-width: 250px; margin: 0 auto; border: 1px solid var(--border-color); border-radius: 8px; display: block;">
            </div>

            {% if qr_name %}
                <div style="background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; margin-bottom: 24px; text-align: left; font-size: 0.9rem;">
                    <div><strong>Vehicle:</strong> {{ qr_name }}</div>
                    {% if qr_owner %}<div><strong>Owner:</strong> {{ qr_owner }}</div>{% endif %}
                </div>
            {% endif %}

            <div class="flex gap-4">
                <a href="{{ url_for('static', filename=qr_path) }}" download class="btn btn-secondary" style="flex: 1;"><i data-lucide="download"></i> Download</a>
                <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="flex: 1;"><i data-lucide="layout-dashboard"></i> Dashboard</a>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
